name: CI - Two Ships
on:
  push:
  workflow_dispatch:
jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jeu_1_two_ships_passing_the_night
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: jeu_1_two_ships_passing_the_night/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Unit tests
        run: npm run test

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Audit dependencies
        run: npm audit
        continue-on-error: true
      
      - name: Test summary
        run: |
          echo "Résultats CI - Two Ships " >> $GITHUB_STEP_SUMMARY
          echo "Tests unitaires lancés" >> $GITHUB_STEP_SUMMARY
          echo "Lint lancé (continue-on-error)" >> $GITHUB_STEP_SUMMARY
          echo "Audit des dépendances lancé" >> $GITHUB_STEP_SUMMARY
          