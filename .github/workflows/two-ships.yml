name: CI/CD - Two Ships

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  tests:
    name: Tests unitaires
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jeu_1_two_ships_passing_the_night
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: jeu_1_two_ships_passing_the_night/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm run test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jeu_1_two_ships_passing_the_night
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: jeu_1_two_ships_passing_the_night/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run lint
        id: lint
        run: npm run lint
        continue-on-error: true

      - name: Annotation lint
        if: steps.lint.outcome == 'failure'
        run: echo "::warning::Le lint a échoué — vérifiez le Google JS Style Guide"

  audit:
    name: Audit dépendances
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jeu_1_two_ships_passing_the_night
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: jeu_1_two_ships_passing_the_night/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run audit
        id: audit
        run: npm audit --audit-level=critical
        continue-on-error: true

      - name: Annotation audit
        if: steps.audit.outcome == 'failure'
        run: echo "::warning::npm audit a détecté des vulnérabilités critiques"

  cypress:
    name: Tests fonctionnels Cypress
    runs-on: ubuntu-latest
    needs: [tests]
    defaults:
      run:
        working-directory: jeu_1_two_ships_passing_the_night
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: jeu_1_two_ships_passing_the_night/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Start Vite server
        run: npm run dev &
      
      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Cypress tests
        run: npm run cypress:run

  summary:
    name: Résumé CI
    runs-on: ubuntu-latest
    needs: [tests, lint, audit, cypress]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## 📊 Résultats CI - Two Ships" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Résultat |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tests unitaires | ${{ needs.tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Audit dépendances | ${{ needs.audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests Cypress | ${{ needs.cypress.result }} |" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Déploiement GitHub Pages
    runs-on: ubuntu-latest
    needs: [tests, lint, audit, cypress]
    if: github.ref == 'refs/heads/main' && needs.tests.result == 'success' && needs.cypress.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: jeu_1_two_ships_passing_the_night/package-lock.json

      - name: Install dependencies
        run: |
          cd jeu_1_two_ships_passing_the_night
          npm install

      - name: Build
        run: |
          cd jeu_1_two_ships_passing_the_night
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: jeu_1_two_ships_passing_the_night/dist
          destination_dir: two-ships