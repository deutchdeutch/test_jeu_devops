name: CI/CD - Space Invaders

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jeu_2_Space_Invaders
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: jeu_2_Space_Invaders/package-lock.json
      - run: npm install
      - name: Run lint
        id: lint
        run: npm run lint
        continue-on-error: true
      - name: Annotation lint
        if: steps.lint.outcome == 'failure'
        run: echo "::warning::Le lint a échoué"

  audit:
    name: Audit dépendances
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jeu_2_Space_Invaders
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: jeu_2_Space_Invaders/package-lock.json
      - run: npm install
      - name: Run audit
        id: audit
        run: npm audit --audit-level=critical
        continue-on-error: true
      - name: Annotation audit
        if: steps.audit.outcome == 'failure'
        run: echo "::warning::npm audit a détecté des vulnérabilités critiques"

  tests:
    name: Tests unitaires
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jeu_2_Space_Invaders
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: jeu_2_Space_Invaders/package-lock.json
      - run: npm install
      - name: Run tests
        run: npm test

  cypress:
    name: Tests fonctionnels Cypress
    runs-on: ubuntu-latest
    needs: [tests]
    defaults:
      run:
        working-directory: jeu_2_Space_Invaders
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: jeu_2_Space_Invaders/package-lock.json
      - run: npm install
      - name: Run Cypress
        run: npm run test:e2e

  summary:
    name: Résumé CI
    runs-on: ubuntu-latest
    needs: [tests, lint, audit, cypress]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## 📊 Résultats CI - Space Invaders" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Résultat |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tests unitaires | ${{ needs.tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Audit dépendances | ${{ needs.audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests Cypress | ${{ needs.cypress.result }} |" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Déploiement GitHub Pages
    runs-on: ubuntu-latest
    needs: [tests, lint, audit, cypress]
    if: github.ref == 'refs/heads/main' && needs.tests.result == 'success' && needs.cypress.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: jeu_2_Space_Invaders/package-lock.json
      - name: Install & Build
        run: |
          cd jeu_2_Space_Invaders
          npm install
          npm run build
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: jeu_2_Space_Invaders/build
          destination_dir: space-invaders