<!DOCTYPE html><html lang=en><meta charset=UTF-8><meta http-equiv=X-UA-Compatible content="IE=edge"><meta name=viewport content="width=device-width, initial-scale=1.0"><title>Space invaders</title><script type=module src=/jeu_2_Space_Invaders.2c9ef5e6.js></script><link rel=stylesheet href=/jeu_2_Space_Invaders.7309a2c1.css><body>
  <canvas id=background></canvas>
  <canvas id=canvas></canvas>
  <pre id=debug></pre>
  <div hidden id=mobile-plane class=mobile>
    <div id=joystick class=mobile-joystick>
      <div id=handle class=mobile-joystick-handle>
        <div id=handle class=mobile-joystick-handle-image></div>
      </div>
    </div>
    <div class=mobile-actions>
      <button id=button-fire class=mobile-actions-button>x</button>
    </div>
  </div>
  <p class=score>Score: <span id=score></span></p>
  <div id=menu class=menu>
    <div class=menu-panel>
      <h1>Space Invaders</h1>
      <button id=start-button>Start</button>
      <fieldset id=input-source>
        <legend>Input source</legend>
        <div>
          <input checked type=radio name=input-source id=input-mouse value=Mouse>
          <label for=input-mouse>Mouse</label>
        </div>
        <div>
          <input type=radio name=input-source id=input-gamepad value=Gamepad>
          <label for=input-gamepad>Gamepad</label>
        </div>
        <div>
          <input type=radio name=input-source id=input-mobile value=Mobile>
          <label for=input-mobile>Mobile</label>
        </div>
      </fieldset>
    </div>
  </div>
  <div hidden id=game-over class=game-over>
    <p class=game-over-header>GAME OVER</p>
    <p class=game-over-score>Score: <span id=game-over-score></span></p>
    <p class=game-over-score>Highscore: <span id=game-over-highscore></span></p>
    <button id=game-over-button>Play again</button>
  </div>
