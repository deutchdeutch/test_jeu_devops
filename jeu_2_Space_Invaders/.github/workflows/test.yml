name: JEUX CI
on: 
 push:
   branches: [ "**" ]
 pull_request:
  branches: [ "main" ]
 workflow_dispatch: 
jobs:
  my_build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code 
        uses: actions/checkout@v3
      - name: setup node
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm" 
      - name: Install
        run: npm ci



