name: CI/CD - Space Invaders

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  tests:
    name: Tests unitaires
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jeu_2_Space_Invaders
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: jeu_2_Space_Invaders/package-lock.json
      - name: Install
        run: npm ci
      - name: Run unit tests
        run: npm test || echo "Pas de tests définis"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jeu_2_Space_Invaders
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: jeu_2_Space_Invaders/package-lock.json
      - name: Install
        run: npm ci
      - name: Run lint
        id: lint
        run: npm run lint
        continue-on-error: true

  audit:
    name: Audit dépendances
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jeu_2_Space_Invaders
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: jeu_2_Space_Invaders/package-lock.json
      - name: Install
        run: npm ci
      - name: Run audit
        id: audit
        run: npm audit --audit-level=critical
        continue-on-error: true

  # Job Cypress (À configurer si tu as des tests E2E)
  cypress:
    name: Tests fonctionnels Cypress
    runs-on: ubuntu-latest
    needs: [tests]
    defaults:
      run:
        working-directory: jeu_2_Space_Invaders
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install & Run Cypress
        run: echo "Exécution des tests Cypress..." # Remplace par ta commande E2E

  summary:
    name: Résumé CI
    runs-on: ubuntu-latest
    needs: [tests, lint, audit, cypress]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## 📊 Résultats CI - Space Invaders" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Résultat |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tests unitaires | ${{ needs.tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Audit dépendances | ${{ needs.audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests Cypress | ${{ needs.cypress.result }} |" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Build & Artifact
    runs-on: ubuntu-latest
    needs: [tests, lint, audit, cypress]
    if: github.ref == 'refs/heads/main' && needs.tests.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build
        run: |
          cd jeu_2_Space_Invaders
          npm ci
          npx parcel build src/index.html --public-url ./ --dist-dir dist
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: space-invaders-prod
          path: jeu_2_Space_Invaders/dist/